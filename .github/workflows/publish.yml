name: Publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to validate (e.g., 1.0.2)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Release candidate — manual dispatch only.
  # Runs all gates, packs tarball, generates checksums, uploads artifacts.
  rc:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run all gates
        run: pnpm check

      - name: Verify changelog
        run: node scripts/changelog-check.mjs

      - name: Build metadata
        run: node scripts/build-metadata.mjs

      - name: Pack tarball
        run: pnpm pack

      - name: Generate checksums
        run: node scripts/generate-checksums.mjs *.tgz dist/build-metadata.json

      - name: Upload RC artifacts
        uses: actions/upload-artifact@v6
        with:
          name: rc-v${{ inputs.version }}
          path: |
            *.tgz
            checksums.txt
            dist/build-metadata.json
          retention-days: 14

  # Release — triggered by version tags only.
  # Runs all gates, packs, creates GitHub release, publishes to npm.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run all gates
        run: pnpm check

      - name: Verify changelog
        run: node scripts/changelog-check.mjs

      - name: Build metadata
        run: node scripts/build-metadata.mjs

      - name: Pack tarball
        run: pnpm pack

      - name: Generate checksums
        run: node scripts/generate-checksums.mjs *.tgz dist/build-metadata.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz
            checksums.txt
            dist/build-metadata.json

      - name: Publish to npm
        run: |
          pnpm publish --provenance --access public --no-git-checks 2>&1 | tee /tmp/publish.log || {
            if grep -q "previously published" /tmp/publish.log; then
              echo "::notice::Version already published — skipping"
              exit 0
            fi
            exit 1
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
